<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 932" width="430" height="932">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <!-- Background -->
  <rect width="430" height="932" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="215" cy="380" r="220" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Grid lines -->
  <g stroke="#00d4ff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="60" x2="430" y2="60"/>
    <line x1="0" y1="120" x2="430" y2="120"/>
    <line x1="0" y1="180" x2="430" y2="180"/>
    <line x1="0" y1="240" x2="430" y2="240"/>
    <line x1="0" y1="300" x2="430" y2="300"/>
    <line x1="0" y1="360" x2="430" y2="360"/>
    <line x1="0" y1="420" x2="430" y2="420"/>
    <line x1="0" y1="480" x2="430" y2="480"/>
    <line x1="0" y1="540" x2="430" y2="540"/>
    <line x1="0" y1="600" x2="430" y2="600"/>
    <line x1="0" y1="660" x2="430" y2="660"/>
    <line x1="0" y1="720" x2="430" y2="720"/>
    <line x1="0" y1="780" x2="430" y2="780"/>
    <line x1="0" y1="840" x2="430" y2="840"/>
    <line x1="0" y1="900" x2="430" y2="900"/>
    <line x1="60"  y1="0" x2="60"  y2="932"/>
    <line x1="120" y1="0" x2="120" y2="932"/>
    <line x1="180" y1="0" x2="180" y2="932"/>
    <line x1="240" y1="0" x2="240" y2="932"/>
    <line x1="300" y1="0" x2="300" y2="932"/>
    <line x1="360" y1="0" x2="360" y2="932"/>
    <line x1="420" y1="0" x2="420" y2="932"/>
  </g>
  <!-- Shield icon (simplified) -->
  <g transform="translate(215,340)">
    <path d="M0,-72 L62,-36 L62,18 C62,52 34,78 0,90 C-34,78 -62,52 -62,18 L-62,-36 Z"
          fill="none" stroke="#00d4ff" stroke-width="3" stroke-opacity="0.9"/>
    <path d="M0,-58 L50,-29 L50,16 C50,44 28,66 0,76 C-28,66 -50,44 -50,16 L-50,-29 Z"
          fill="#00d4ff" fill-opacity="0.08"/>
    <!-- OG text -->
    <text x="0" y="12" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
          font-size="28" font-weight="900" fill="#00d4ff" letter-spacing="-1">OG</text>
  </g>
  <!-- OmniaGuard wordmark -->
  <text x="215" y="460" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="32" font-weight="900" fill="#ffffff" letter-spacing="-1">OmniaGuard</text>
  <!-- Tagline -->
  <text x="215" y="496" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#00d4ff" letter-spacing="2">AI SECURITY</text>
  <!-- Agent count badge -->
  <rect x="152" y="520" width="126" height="28" rx="14" fill="none" stroke="#00d4ff" stroke-opacity="0.3"/>
  <text x="215" y="539" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" font-weight="700" fill="#00d4ff" letter-spacing="1">⬡ 14 AGENTS ACTIVE</text>
  <!-- Bottom bar -->
  <rect x="0" y="929" width="430" height="3" fill="#00d4ff" opacity="0.5"/>
</svg>
